<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <nav>
        <div id="name-left">Kanban Board</div>
        <div id="add-btn-right"><button>Add New Task</button></div>
      </nav>
      <section id="board">
        <div id="todo" class="task-column">
          <div class="heading">
            <div class="left">To Do</div>
            <div class="right">Tasks: <span class="tasksNums">0</span></div>
          </div>
          <!-- Tasks -->
        </div>
        <div id="progress" class="task-column">
          <!--  heading Section -->
          <div class="heading">
            <div class="left">In Progress</div>
            <div class="right">Tasks: <span class="tasksNums">0</span></div>
          </div>
          <!-- Tasks -->
        </div>
        <div id="completed" class="task-column">
          <div class="heading">
            <div class="left">Completed</div>
            <div class="right">Tasks: <span class="tasksNums">0</span></div>
          </div>
        </div>
      </section>
    </main>
    <div class="modal">
      <div class="bg"></div>
      <div class="center">
        <input
          type="text"
          name="text"
          id="task-title"
          placeholder="Task Title"
        />
        <textarea
          name="text"
          id="task-description"
          placeholder="Task Description"
        ></textarea>
        <button id="add-newTask">Add Task</button>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
