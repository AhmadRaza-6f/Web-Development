<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <section>
        <div class="infos">
          <!-- highest score section -->
          <div class="info">
            <div>
              <h3>Highest Score: <span id="hig-score">0</span></h3>
            </div>
          </div>
          <!-- Score Section -->
          <div class="info">
            <div>
              <h3>Score: <span id="score">0</span></h3>
            </div>
          </div>
          <!-- Time Section -->
          <div class="info">
            <div>
              <h3>Time: <span id="time">00:00</span></h3>
            </div>
          </div>
        </div>
        <div class="board">
          <!-- Snake Game Board -->
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
